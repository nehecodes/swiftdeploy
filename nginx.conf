worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=30s;
    
    # ── Real-IP: trust Docker bridge and RFC-1918 ranges ─────────────────────
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    log_format swiftdeploy
        '$time_iso8601 | $status | ${request_time}s | $upstream_addr | $request';

    access_log /var/log/nginx/access.log swiftdeploy;

    sendfile   on;
    tcp_nopush on;
    keepalive_timeout 65;

    proxy_connect_timeout 30s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    proxy_http_version    1.1;

    server {
        listen      8443;
        server_name localhost;

        add_header X-Deployed-By "swiftdeploy" always;
        add_header X-Request-ID  $request_id   always;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_set_header X-Mode            $upstream_http_x_mode;

        set $backend_service backend:8080;

        location / {
            proxy_pass http://$backend_service;
            add_header X-Mode        $upstream_http_x_mode always;
            add_header X-Deployed-By "swiftdeploy"         always;
        }

        location /healthz {
            access_log off;
            proxy_pass http://$backend_service/healthz;
        }

        error_page 502 = @error502;
        error_page 503 = @error503;
        error_page 504 = @error504;

        location @error502 {
            internal;
            default_type application/json;
            return 502 '{"error":"bad_gateway","code":502,"service":"backend","contact":"nehemiah.dev"}';
        }
        location @error503 {
            internal;
            default_type application/json;
            return 503 '{"error":"service_unavailable","code":503,"service":"backend","contact":"nehemiah.dev"}';
        }
        location @error504 {
            internal;
            default_type application/json;
            return 504 '{"error":"gateway_timeout","code":504,"service":"backend","contact":"nehemiah.dev"}';
        }
    }
}
