services:
  backend:
    image: swift-deploy-1-node:latest
    expose:
      - "8080"
    networks:
      - swiftdeploy-net
    environment:
      - MODE=canary
      - APP_VERSION=1.0.0
      - APP_PORT=8080
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "8443:8443"
    networks:
      - swiftdeploy-net
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

networks:
  swiftdeploy-net:
    driver: bridge

